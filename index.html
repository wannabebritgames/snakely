<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro Snake Arcade</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ui">
    <h1>🐍 RETRO SNAKE</h1>

    <div id="menu">
        <label>Snake Color</label>
        <select id="color">
            <option value="#39ff14">Neon Green</option>
            <option value="#00f0ff">Cyan</option>
            <option value="#ff3df2">Pink</option>
            <option value="#ffae00">Orange</option>
        </select>

        <button id="start">START GAME</button>

        <p id="scoreText">Score: 0</p>
        <p id="highText">High Score: 0</p>
    </div>
</div>

<canvas id="game"></canvas>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
